services:
  roche-limit:
    image: ghcr.io/recelsus/roche-limit:latest
    container_name: roche-limit
    restart: unless-stopped
    # Example:
    # environment:
    #   ROCHE_LIMIT_TRUSTED_PROXIES: "127.0.0.1,::1,172.18.0.0/16"
    #   ROCHE_LIMIT_SESSION_COOKIE_NAME: "roche_limit_session"
    #   ROCHE_LIMIT_SESSION_COOKIE_PATH: "/"
    #   ROCHE_LIMIT_SESSION_COOKIE_SAMESITE: "Lax"
    #   ROCHE_LIMIT_SESSION_COOKIE_SECURE: "1"
    #   ROCHE_LIMIT_SESSION_COOKIE_MAX_AGE: "604800"

    # Test only.
    # In production, remove `ports` and place this container on the same
    # internal Docker network as nginx and the backend services.
    ports:
      - "8080:8080"

    # Example for production use:
    # networks:
    #   - internal

    volumes:
      - ./data:/var/lib/roche-limit

# Example for production use:
# networks:
#   internal:
#     external: true
