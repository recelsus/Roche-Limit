name: docker

on:
  push:
    branches:
      - master
    tags:
      - "v*"
    paths:
      - "lib/**"
      - "server/**"
      - "schema/**"
      - "tools/**"
      - "tests/**"
      - "docker/**"
      - ".github/workflows/docker.yml"
      - "CMakeLists.txt"
  pull_request:
    branches:
      - master
    paths:
      - "lib/**"
      - "server/**"
      - "schema/**"
      - "tools/**"
      - "tests/**"
      - "docker/**"
      - ".github/workflows/docker.yml"
      - "CMakeLists.txt"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cmake \
            git \
            libc-ares-dev \
            libjsoncpp-dev \
            libsodium-dev \
            libsqlite3-dev \
            libssl-dev \
            ninja-build \
            pkg-config \
            uuid-dev \
            zlib1g-dev

      - name: Build Drogon
        run: |
          git clone --depth 1 --recursive --shallow-submodules --branch v1.9.11 https://github.com/drogonframework/drogon.git /tmp/drogon
          cmake -S /tmp/drogon -B /tmp/drogon/build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/drogon-install \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_ORM=OFF \
            -DBUILD_CTL=OFF
          cmake --build /tmp/drogon/build
          cmake --install /tmp/drogon/build

      - name: Configure
        run: |
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH=/tmp/drogon-install \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-and-push:
    needs: build-test
    runs-on: ubuntu-latest
    env:
      GHCR_HAS_PAT: ${{ secrets.GHCR_PAT != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR with PAT
        if: ${{ github.event_name != 'pull_request' && env.GHCR_HAS_PAT == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Login to GHCR with GITHUB_TOKEN
        if: ${{ github.event_name != 'pull_request' && env.GHCR_HAS_PAT != 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/recelsus/roche-limit
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
